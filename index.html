<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ScaleShield — Agency Infrastructure</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="shortcut icon" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<style>
:root{
  --bg:#07080B;
  --bg2:#0D0F18;
  --panel:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.12);

  --gold:#D6B15E;
  --gold2:#F2D27A;

  --text:#ffffff;
  --muted:rgba(255,255,255,.65);
  --muted2:rgba(255,255,255,.45);

  --radius:22px;
  --ease:cubic-bezier(.2,.8,.2,1);

  --tg:#2AABEE;
  --wa:#25D366;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background:
    radial-gradient(900px circle at 50% -20%, rgba(214,177,94,.16), transparent 55%),
    radial-gradient(800px circle at 85% 5%, rgba(56,189,248,.08), transparent 60%),
    radial-gradient(800px circle at 10% 30%, rgba(168,85,247,.07), transparent 60%),
    linear-gradient(135deg,#050507,#0b0d14,#090a10);
  color:var(--text);
  overflow-x:hidden;
}

a{color:inherit;text-decoration:none}

section{
  max-width:1200px;
  margin:auto;
  padding:88px 24px;
}

h1{
  font-size:50px;
  font-weight:900;
  letter-spacing:-.03em;
  line-height:1.06;
}
h2{
  font-size:38px;
  font-weight:850;
}

.kicker{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
  color:var(--muted2);
  font-size:12px;
  letter-spacing:.22em;
  font-weight:950;
}

.kdot{
  width:8px;height:8px;border-radius:999px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
}

.grad{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

/* NAV */

.nav{
  position:fixed;
  top:0;left:0;right:0;
  backdrop-filter:blur(14px);
  background:rgba(5,5,7,.65);
  border-bottom:1px solid rgba(255,255,255,.06);
  z-index:100;
}

.nav-inner{
  max-width:1200px;
  margin:auto;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img{
  height:34px;
}

/* Buttons */

.btn{
  padding:14px 18px;
  border-radius:16px;
  font-weight:900;
  display:inline-flex;
  align-items:center;
  gap:10px;
}

.btn-primary{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.btn-ghost{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);
}

/* HERO */

.hero{
  padding-top:170px;
  text-align:center;
}

.hero-actions{
  margin-top:28px;
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

/* Cards */

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:22px;
  padding:28px;
}

/* Grid */

.grid-3{
  display:grid;
  gap:24px;
}

@media(min-width:900px){
  .grid-3{grid-template-columns:repeat(3,1fr)}
}

.grid-4{
  display:grid;
  gap:24px;
}

@media(min-width:1100px){
  .grid-4{grid-template-columns:repeat(4,1fr)}
}

/* Footer */

footer{
  border-top:1px solid rgba(255,255,255,.06);
  padding:42px 24px;
  text-align:center;
  color:var(--muted);
}

/* Floating buttons removed */
.float{display:none !important}

/* Mobile menu */

.mobile-menu{
  display:none;
  position:fixed;
  top:14px;
  right:14px;
  z-index:1000;
}

.kebab{
  width:44px;height:44px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(5,5,7,.55);
  display:grid;
  place-items:center;
  cursor:pointer;
}

.kebab .dots{
  display:flex;
  gap:5px;
}

.kebab .dots span{
  width:5px;
  height:5px;
  border-radius:999px;
  background:white;
}

.menu-panel{
  margin-top:10px;
  width:240px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  background:#0e0e14;
  display:none;
}

.menu-panel.open{display:block}

.menu-panel a{
  display:block;
  padding:14px;
  border-top:1px solid rgba(255,255,255,.05);
}

@media(max-width:979px){
  .nav{display:none;}
  .mobile-menu{display:block;}
  .hero{padding-top:110px;}
}
</style>
</head>

<body>

<!-- MOBILE MENU -->
<div class="mobile-menu">
  <div class="kebab" id="kebabBtn">
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <div class="menu-panel" id="menuPanel">
    <a href="#stats">Stats</a>
    <a href="#verticals">Verticals</a>
    <a href="#graph">Graph</a>
    <a href="#pricing">Pricing</a>
    <a href="#reviews">Reviews</a>
    <a href="#faq">FAQ</a>
    <a href="payment-details.html" target="_blank">Payment Details</a>
    <a href="login.html" target="_blank">Log in</a>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">

    <div class="logo">
      <img src="logo.png" alt="ScaleShield">
    </div>

    <div style="display:flex;gap:10px">
      <a href="https://t.me/scaleshieldsupport" target="_blank" class="btn btn-ghost">Telegram</a>
      <a href="https://wa.me/qr/ED5IWY7RKNSPC1" target="_blank" class="btn btn-ghost">WhatsApp</a>
      <a href="https://t.me/scaleshieldsupport" target="_blank" class="btn btn-primary">Contact</a>
    </div>

  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="kicker"><span class="kdot"></span> RELIABLE META INFRASTRUCTURE</div>

  <h1>Scale Meta with <span class="grad">Premium</span> agency infrastructure.</h1>

  <p>Stable access, fast onboarding and unlimited replacements.</p>

  <div class="hero-actions">
    <a href="#pricing" class="btn btn-primary">View Pricing</a>
  </div>
</section>

<footer>
© <span id="year"></span> ScaleShield — All rights reserved.
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear()

const kebabBtn = document.getElementById("kebabBtn")
const menuPanel = document.getElementById("menuPanel")

kebabBtn.addEventListener("click",()=>{
menuPanel.classList.toggle("open")
})
</script>

</body>
</html>
